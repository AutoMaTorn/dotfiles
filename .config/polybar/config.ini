[colors]
background = #181818
background-alt = #181818
foreground = #ededed
primary = #ededed
secondary = #ededed
alert = #ededed
disabled = #ededed

color1 = #ededed
color2 = #6d89a7
color3 = #485571
color4 = #8abe8a
color5 = #ffb99c
color6 = #ff7f7f

