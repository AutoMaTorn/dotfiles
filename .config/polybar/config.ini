[colors]
background = #181818
background-alt = #141414
foreground = #EDEDED
primary = #c3efed
secondary = #c3efed
alert = #C9D9D8
disabled = #939393
color1 = #ededed
color2 = #b7b7b7
color3 = #939393
color4 = #676767
color5 = #525252
color6 = #c3efed

[bar/automatorn]
width = 100%
height = 31
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-bottom-size = 0pt
border-bottom-color = ${colors.foreground}
padding-left = 0
padding-right = 0
module-margin = 0
separator = ""
separator-foreground = ${colors.foreground}
font-0 = "JetBrainsMono Nerd Font;2"
font-1 = "Symbols Nerd Font:size=34;-5"
modules-left = xworkspaces music
modules-right = tray round-left xkeyboard round-right battery pulseaudio memory bluetooth network date
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3

[module/xworkspaces]
type = internal/xworkspaces
label-active = "●"
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-active-padding = 1
label-occupied = "○"
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1
label-urgent = "○"
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 1
label-empty = "·"
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/music]
type = custom/script
exec = playerctl -a metadata --format "{{artist}} - {{title}}" 2>/dev/null || echo "No music"
interval = 2
label = %output:0:40:...%
label-foreground = ${colors.background}
label-background = ${colors.color}
label-padding = 1

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock
label-layout = %icon%
layout-icon-0 = us;US
layout-icon-1 = ru;RU
label-indicator-padding = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.color1}
label-layout-padding = 1
label-layout-foreground = ${colors.background}
label-layout-background = ${colors.color1}

[module/battery]
type = custom/script
exec = ~/dotfiles/.config/polybar/battery.sh
interval = 5
label = %output%
label-foreground = ${colors.background}
label-background = ${colors.color2}
label-padding = 1

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = " VOL"
format-volume-prefix-foreground = ${colors.background}
format-volume = <label-volume>
format-volume-foreground = ${colors.background}
format-volume-background = ${colors.color3}
label-volume = %percentage%%
label-muted = MUTED
label-muted-foreground = ${colors.background}
label-muted-background = ${colors.color3}
label-volume-padding = 1
label-muted-padding = 1

[module/memory]
type = internal/memory
interval = 2
label = RAM %percentage_used:2%%
label-foreground = ${colors.background}
label-background = ${colors.color3}
label-padding = 1

[module/bluetooth]
type = custom/script
exec = ~/dotfiles/.config/polybar/bluetooth.sh
interval = 5
label = %output%
label-foreground = ${colors.background}
label-background = ${colors.color4}
label-padding = 1
click-left = kitty -e bluetoothctl

[module/network]
type = custom/script
exec = ~/dotfiles/.config/polybar/network.sh
interval = 2
label = %output%
label-foreground = ${colors.background}
label-background = ${colors.color5}
label-padding = 1
click-left = kitty -e nmtui

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y.%m.%d %H:%M
label =  %date%
label-foreground = ${colors.background}
label-background = ${colors.color6}
label-padding = 1

[module/tray]
type = internal/tray
tray-padding = 2

[settings]
screenchange-reload = true
pseudo-transparency = true
