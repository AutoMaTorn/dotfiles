[bar/automatorn]
width = 100%
height = 24pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-bottom-size = 0pt
border-bottom-color = ${colors.foreground}

padding-left = 0
padding-right = 0

module-margin = 0

separator = ""
separator-foreground = ${colors.foreground}

font-0 = monospace;2

modules-left = xworkspaces xwindow
modules-right = tray xkeyboard battery pulseaudio memory bluetooth network date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
wm-restack = i3

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.foreground}
label-active-foreground = ${colors.background}
label-active-padding = 1 

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-padding = 2

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %icon%

layout-icon-0 = us;US
layout-icon-1 = ru;RU

label-indicator-padding = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.color1}
label-layout-padding = 1

label-layout-foreground = ${colors.background}
label-layout-background = ${colors.color1}

[module/battery]
type = custom/script
exec = ~/dotfiles/.config/polybar/battery.sh
interval = 5

label = %output%
label-foreground = ${colors.background}
label-background = ${colors.color2}
label-padding = 1

#[module/filesystem]
#type = internal/fs
#interval = 25

#mount-0 = /

#label-mounted = DISK %percentage_used%%
#label-mounted-foreground = ${colors.foreground}

#label-unmounted = %mountpoint% not mounted
#label-unmounted-foreground = ${colors.disabled}

#label-mounted-padding = 1
#label-unmounted-padding = 1

#label-mounted-background = ${colors.background}
#label-unmounted-background = ${colors.background}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = " VOL"
format-volume-prefix-foreground = ${colors.background}
format-volume = <label-volume>
format-volume-foreground = ${colors.background}
format-volume-background = ${colors.color3}
label-volume = %percentage%%

label-muted = MUTED
label-muted-foreground = ${colors.background}
label-muted-background = ${colors.color3}

label-volume-padding = 1
label-muted-padding = 1

[module/memory]
type = internal/memory
interval = 2
label = RAM %percentage_used:2%%
label-foreground = ${colors.background}
label-background = ${colors.color4}
label-padding = 1

[module/bluetooth]
type = custom/script
exec = ~/dotfiles/.config/polybar/bluetooth.sh
interval = 5

label = %output%
label-foreground = ${colors.background}
label-background = ${colors.color2}
label-padding = 1
click-left = kitty -e bluetoothctl

[network-base]
type = internal/network
interval = 1
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = WIFI disconnected
label-disconnected-padding = 1
label-disconnected-background = ${colors.color5}
label-disconnected-foreground = ${colors.background}

[module/network]
type = custom/script
exec = ~/dotfiles/.config/polybar/network.sh
interval = 2

label = %output%
label-foreground = ${colors.background}
label-background = ${colors.color5}
label-padding = 1
click-left = kitty -e nmtui

[module/date]
type = internal/date
interval = 1

date = %H:%M 
date-alt = %Y.%m.%d %H:%M

label =  %date% 
label-foreground = ${colors.background}
label-background = ${colors.color6}
label-padding = 1

[module/tray]
type = internal/tray
tray-padding = 2

[settings]
screenchange-reload = true
pseudo-transparency = true
