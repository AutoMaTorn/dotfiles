# ============================================
# Kitty Terminal Config
# ============================================

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Performance
repaint_delay    8
input_delay      2
sync_to_monitor  yes

# Cursor
cursor_shape     beam
cursor_blink_interval 0.8

# Window
remember_window_size  no
initial_window_width  90c
initial_window_height 26c
window_padding_width  8
hide_window_decorations no
confirm_os_window_close 0

# Background opacity (picom handles this, but kitty can do it natively too)
background_opacity 0.75

# Scrollback
scrollback_lines 10000

# Mouse
mouse_hide_wait 3.0
url_color #c3efed
url_style curly

# Sounds
enable_audio_bell no
visual_bell_duration 0.0

# Shell integration
shell_integration enabled

# Theme: Polybar Palette
background            #181818
foreground            #EDEDED
cursor                #c3efed
cursor_text_color     #181818
selection_background  #525252
selection_foreground  #EDEDED

color0  #525252
color1  #c3efed
color2  #b7b7b7
color3  #939393
color4  #676767
color5  #EDEDED
color6  #c3efed
color7  #b7b7b7
color8  #525252
color9  #c3efed
color10 #b7b7b7
color11 #939393
color12 #676767
color13 #EDEDED
color14 #c3efed
color15 #EDEDED

# Tab bar
tab_bar_edge        bottom
tab_bar_style       powerline
tab_powerline_style slanted
active_tab_background   #c3efed
active_tab_foreground   #181818
inactive_tab_background #525252
inactive_tab_foreground #EDEDED

# Keybindings
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
