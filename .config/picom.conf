# Minimal tear-free picom config

backend = "glx";
vsync = true;

detect-client-opacity = true;
refresh-rate = 0;

# Disable effects for performance
shadow = false;
fading = false;
blur-background = false;

# Rules to skip composition on fullscreen (optional performance tweak)
unredir-if-possible = false;

# Rounded corners for all windows
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'i3lock'"
];
